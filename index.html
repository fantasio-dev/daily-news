<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
  <title>뉴스 쇼츠</title>
  <meta name="theme-color" content="#000000">
  <style>
    /* CSS Reset & Base */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── 상단 필터 바 (월별/전체) ── */
    .filter-wrap {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 20;
      background: linear-gradient(to bottom, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.4) 70%, transparent 100%);
      padding-bottom: 8px;
    }
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-chip {
      flex-shrink: 0;
      padding: 6px 16px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.7);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
    }
    .filter-chip:hover {
      background: rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.9);
    }
    .filter-chip.active {
      background: #fff;
      color: #000;
      border-color: #fff;
    }

    /* ── 쇼츠 컨테이너 ── */
    .shorts {
      height: 100vh;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      -webkit-overflow-scrolling: touch;
    }
    .shorts::-webkit-scrollbar { display: none; }

    /* ── 카드 한 장 ── */
    .card {
      height: 100vh;
      width: 100vw;
      scroll-snap-align: start;
      scroll-snap-stop: normal;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      background: #000;
    }
    .card img {
      max-width: 96%;
      max-height: 88vh;
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
      border-radius: 8px;
    }

    /* ── 날짜 태그 (좌상단) ── */
    .card .tag {
      position: absolute;
      top: 70px;
      left: 16px;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      color: rgba(255,255,255,0.9);
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      pointer-events: none;
    }

    /* ── 우측 하단 일자 선택 FAB ── */
    .date-fab {
      position: fixed;
      bottom: 24px;
      right: 20px;
      z-index: 30;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
      cursor: pointer;
      font-size: 1.4rem;
      transition: transform 0.2s, background 0.2s;
    }
    .date-fab:active {
      transform: scale(0.9);
      background: rgba(255,255,255,0.25);
    }

    /* ── 일자 선택 바텀 시트 (모달) ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
      z-index: 100;
      display: flex;
      align-items: flex-end;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .modal-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }
    .modal-sheet {
      background: #1c1c1e;
      width: 100%;
      max-height: 75vh;
      border-radius: 20px 20px 0 0;
      padding: 24px 20px;
      overflow-y: auto;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.1);
      box-shadow: 0 -4px 24px rgba(0,0,0,0.5);
    }
    .modal-overlay.open .modal-sheet {
      transform: translateY(0);
    }
    .modal-sheet h3 {
      color: #fff;
      margin: 0 0 16px 8px;
      font-size: 1.1rem;
    }
    .date-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .date-item {
      padding: 14px 16px;
      color: rgba(255,255,255,0.8);
      font-size: 1rem;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .date-item:active {
      background: rgba(255,255,255,0.1);
    }
    .date-item.active {
      background: rgba(255,255,255,0.15);
      color: #fff;
      font-weight: 600;
    }

    /* ── 빈 상태 ── */
    .empty {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.4);
      font-size: 1rem;
      gap: 1rem;
      padding: 2rem;
      text-align: center;
    }
  </style>
</head>
<body>

  <!-- 상단 필터 바 -->
  <div class="filter-wrap">
    <div class="filter-bar" id="filterBar"></div>
  </div>

  <!-- 쇼츠 뷰어 영역 -->
  <div class="shorts" id="shorts"></div>

  <!-- 우측 하단 특정 일자 선택 버튼 -->
  <div class="date-fab" id="dateFab" title="일자 선택">📅</div>

  <!-- 특정 일자 선택 바텀 시트 모달 -->
  <div class="modal-overlay" id="dateModal">
    <div class="modal-sheet" id="modalSheet">
      <h3>특정 일자 선택</h3>
      <div class="date-list" id="dateList"></div>
    </div>
  </div>

  <script>
    (async function() {
      const ALL_IMAGES = await fetch('images.json').then(r => r.json());

      const months = [...new Set(ALL_IMAGES.map(img => img.month))];
      const dates = [...new Set(ALL_IMAGES.map(img => img.date))];

      const filterBar = document.getElementById('filterBar');
      const dateList = document.getElementById('dateList');
      const dateModal = document.getElementById('dateModal');
      const shortsEl = document.getElementById('shorts');
      const WINDOW = 3;

      let currentFilterMonth = 'all';
      let currentFilterDate = 'all';
      let activeImages = [];
      let currentCards = [];
      let lastCenter = -1;

      filterBar.innerHTML = `<div class="filter-chip active" data-month="all">전체</div>` +
        months.map(m => `<div class="filter-chip" data-month="${m}">${m}</div>`).join('');

      dateList.innerHTML = `<div class="date-item active" data-date="all">모든 일자 보기</div>` +
        dates.map(d => `<div class="date-item" data-date="${d}">${d}</div>`).join('');

      function applyFilters() {
        let filtered = ALL_IMAGES;
        if (currentFilterDate !== 'all') {
          filtered = filtered.filter(img => img.date === currentFilterDate);
          currentFilterMonth = 'all';
        } else if (currentFilterMonth !== 'all') {
          filtered = filtered.filter(img => img.month === currentFilterMonth);
        }
        document.querySelectorAll('.filter-chip').forEach(chip => {
          const isActive = currentFilterDate !== 'all'
            ? chip.dataset.month === 'all'
            : chip.dataset.month === currentFilterMonth;
          chip.classList.toggle('active', isActive);
        });
        document.querySelectorAll('.date-item').forEach(item => {
          item.classList.toggle('active', item.dataset.date === currentFilterDate);
        });
        renderShorts(filtered);
      }

      filterBar.addEventListener('click', (e) => {
        if (e.target.classList.contains('filter-chip')) {
          currentFilterMonth = e.target.dataset.month;
          currentFilterDate = 'all';
          applyFilters();
        }
      });

      dateList.addEventListener('click', (e) => {
        if (e.target.classList.contains('date-item')) {
          currentFilterDate = e.target.dataset.date;
          dateModal.classList.remove('open');
          applyFilters();
        }
      });

      document.getElementById('dateFab').addEventListener('click', () => {
        dateModal.classList.add('open');
      });
      dateModal.addEventListener('click', (e) => {
        if (e.target === dateModal) dateModal.classList.remove('open');
      });

      function renderShorts(images) {
        activeImages = images;
        shortsEl.innerHTML = '';
        currentCards = [];
        lastCenter = -1;
        if (images.length === 0) {
          shortsEl.innerHTML = `<div class="empty">조건에 맞는 뉴스가 없습니다.</div>`;
          return;
        }
        const frag = document.createDocumentFragment();
        images.forEach((_, i) => {
          const div = document.createElement('div');
          div.className = 'card';
          div.dataset.index = i;
          div.dataset.loaded = '0';
          frag.appendChild(div);
          currentCards.push(div);
        });
        shortsEl.appendChild(frag);
        shortsEl.scrollTo({ top: 0, behavior: 'auto' });
        updateWindow();
      }

      function loadCard(i) {
        if (i < 0 || i >= activeImages.length) return;
        const card = currentCards[i];
        if (!card || card.dataset.loaded === '1') return;
        card.dataset.loaded = '1';
        const item = activeImages[i];
        const tag = document.createElement('div');
        tag.className = 'tag';
        tag.textContent = item.date;
        card.appendChild(tag);
        const img = document.createElement('img');
        img.src = item.src;
        img.alt = item.date;
        img.onerror = () => { img.style.display = 'none'; };
        card.appendChild(img);
      }

      function unloadCard(i) {
        if (i < 0 || i >= activeImages.length) return;
        const card = currentCards[i];
        if (!card || card.dataset.loaded !== '1') return;
        card.dataset.loaded = '0';
        card.innerHTML = '';
      }

      function updateWindow() {
        const h = shortsEl.clientHeight;
        if (h === 0) return;
        const center = Math.round(shortsEl.scrollTop / h);
        if (center === lastCenter) return;
        const prevCenter = lastCenter;
        lastCenter = center;
        for (let i = center - WINDOW; i <= center + WINDOW; i++) loadCard(i);
        if (prevCenter >= 0) {
          for (let i = prevCenter - WINDOW; i <= prevCenter + WINDOW; i++) {
            if (i < center - WINDOW || i > center + WINDOW) unloadCard(i);
          }
        }
      }

      shortsEl.addEventListener('scroll', () => requestAnimationFrame(updateWindow));
      applyFilters();
    })();
  </script>
</body>
</html>
